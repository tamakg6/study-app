<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>chaT</title>
    <link rel="stylesheet" href="style.css?v=10">
</head>
<body>
    <div id="auth-overlay">
        <div class="auth-card">
            <h2 id="auth-title">chaT にログイン</h2>
            <input type="text" id="auth-displayname" placeholder="表示名" style="display:none;">
            <input type="text" id="auth-userid" placeholder="ユーザーID">
            <input type="password" id="auth-password" placeholder="パスワード">
            <button onclick="handleAuth()" id="auth-btn">ログイン</button>
            <p onclick="toggleAuthMode()" id="auth-toggle">新規登録はこちら</p>
        </div>
    </div>

    <div id="app" style="display: none;">
        <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
        
        <aside id="sidebar">
            <div class="server-name">chaT</div>
            <div class="sidebar-scroll">
                <div class="sidebar-section">チャンネル</div>
                <ul id="channel-list">
                    <li onclick="selectChannel('general')"># general</li>
                </ul>
                <div class="sidebar-section">ダイレクトメッセージ</div>
                <ul id="user-list"></ul>
            </div>
            <div id="user-info-area">
                <span id="user-display-name"></span>
                <button onclick="logout()">ログアウト</button>
            </div>
        </aside>

        <main id="chat-container">
            <header id="main-header">
                <button id="menu-btn" onclick="toggleSidebar()">☰</button>
                <span id="display-channel-name"># general</span>
            </header>

            <div id="messages"></div>

            <div id="input-area">
                <input type="text" id="message-input" placeholder="メッセージを送信..." autocomplete="off">
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
